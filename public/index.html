<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>🎮 Live Guessing Game</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="container">
    <!-- Login Screen -->
    <div id="loginScreen" class="screen active">
      <div class="login-card">
        <div class="login-header">
          <h1>🎮</h1>
          <h2>Guessing Game</h2>
          <p>Play with Friends</p>
        </div>
        
        <form id="loginForm">
          <div class="form-group">
            <label for="usernameInput">Username</label>
            <input 
              type="text" 
              id="usernameInput" 
              placeholder="Enter username (3-20 chars)" 
              maxlength="20"
              autocomplete="off"
            >
          </div>
          <button type="submit" class="btn btn-primary btn-large">Join Game</button>
        </form>
        
        <div id="loginError" class="error-message"></div>
      </div>
    </div>

    <!-- Main Screen -->
    <div id="mainScreen" class="screen">
      <header class="main-header">
        <div class="header-left">
          <h1>🎮 Guessing Game</h1>
          <p id="userGreeting"></p>
        </div>
        <div class="header-right">
          <button id="leaderboardBtn" class="btn btn-secondary">📊 Leaderboard</button>
          <button id="logoutBtn" class="btn btn-danger">Logout</button>
        </div>
      </header>

      <main class="main-content">
        <div class="sessions-container">
          <div class="sessions-header">
            <h2>Available Sessions</h2>
            <button id="refreshBtn" class="btn btn-small">🔄</button>
          </div>

          <div class="create-session">
            <input 
              type="text" 
              id="sessionNameInput" 
              placeholder="Session name" 
              maxlength="50"
            >
            <button id="createSessionBtn" class="btn btn-success">Create Session</button>
          </div>

          <div id="sessionsList" class="sessions-list">
            <p class="loading">Loading sessions...</p>
          </div>
        </div>
      </main>
    </div>

    <!-- Game Screen -->
    <div id="gameScreen" class="screen">
      <header class="game-header">
        <div class="game-title">
          <h2 id="sessionName"></h2>
          <span id="statusBadge" class="status-badge"></span>
        </div>
        <button id="leaveGameBtn" class="btn btn-danger btn-small">Leave</button>
      </header>

      <div class="game-layout">
        <!-- Main Game Area -->
        <main class="game-main">
          <!-- Question Area -->
          <div id="questionArea" class="game-section hidden">
            <h3>❓ Question</h3>
            <p id="questionText" class="question-display"></p>
            <div class="guess-input-group">
              <input 
                type="text" 
                id="guessInput" 
                placeholder="Your guess..." 
                autocomplete="off"
              >
              <button id="guessBtn" class="btn btn-primary">Guess</button>
            </div>
            <div id="attemptsInfo" class="attempts-info"></div>
          </div>

          <!-- Setup Area (Game Master) -->
          <div id="setupArea" class="game-section hidden">
            <h3>📝 Create Question</h3>
            <div class="form-group">
              <label>Question</label>
              <textarea 
                id="questionInput" 
                placeholder="Ask a question..." 
                rows="3"
                maxlength="500"
              ></textarea>
            </div>
            <div class="form-group">
              <label>Answer</label>
              <input 
                type="text" 
                id="answerInput" 
                placeholder="Correct answer" 
                maxlength="100"
              >
            </div>
            <button id="createQuestionBtn" class="btn btn-success btn-block">Create Question</button>
            <div id="setupError" class="error-message"></div>
          </div>

          <!-- Ready Area -->
          <div id="readyArea" class="game-section hidden">
            <h3>🎯 Ready to Play?</h3>
            <p id="readyMessage" class="ready-message"></p>
            <button id="startGameBtn" class="btn btn-primary btn-large btn-block">Start Game</button>
            <div id="startError" class="error-message"></div>
          </div>

          <!-- Waiting Area -->
          <div id="waitingArea" class="game-section hidden">
            <div class="waiting-container">
              <div class="spinner"></div>
              <p>Waiting for game master...</p>
            </div>
          </div>

          <!-- Chat/Messages Area -->
          <div class="chat-area">
            <div id="messages" class="messages"></div>
          </div>
        </main>

        <!-- Players Sidebar -->
        <aside class="game-sidebar">
          <h3>👥 Players (<span id="playerCount">0</span>)</h3>
          <div id="playersList" class="players-list"></div>
          
          <div class="sidebar-section">
            <h4>Your Score</h4>
            <p id="yourScore" class="your-score">0 pts</p>
          </div>
        </aside>
      </div>
    </div>

    <!-- Leaderboard Modal -->
    <div id="leaderboardModal" class="modal hidden">
      <div class="modal-content">
        <div class="modal-header">
          <h2>📊 Global Leaderboard</h2>
          <button id="closeLeaderboardBtn" class="modal-close">✕</button>
        </div>
        <table class="leaderboard-table">
          <thead>
            <tr>
              <th>Rank</th>
              <th>Player</th>
              <th>Score</th>
            </tr>
          </thead>
          <tbody id="leaderboardBody"></tbody>
        </table>
      </div>
    </div>
  </div>

  <script src="/socket.io/socket.io.js"></script>
  <script src="client.js"></script>
</body>
</html>
